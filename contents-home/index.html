<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#FFFFFF">
  <title>콘텐츠 - 잡코리아</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
  <style>
    :root {
      --g900:#222; --g800:#444; --g700:#666; --g600:#888; --g500:#999;
      --g400:#BBB; --g300:#D1D1D1; --g200:#E8E8E8; --g100:#F4F4F4; --g50:#F7F7F7;
      --white:#FFF; --black:#000;
      --orange:#FF6B35; --red:#E8553D;
      --hdr:56px; --nav:56px; --safe:env(safe-area-inset-bottom,0px);
      --pad:20px; --gutter:16px;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{-webkit-text-size-adjust:100%}
    body{font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,Roboto,sans-serif;color:var(--g900);background:var(--white);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
    a{text-decoration:none;color:inherit}
    button{border:none;background:none;font:inherit;cursor:pointer;color:inherit}
    img{display:block;max-width:100%}

    /* App Shell — 하단 bg를 QnA 컬러로 채워 흰색 틈 방지 */
    .app{max-width:480px;margin:0 auto;position:relative;min-height:100dvh;background:#F0F2FA}

    /* ===== Header (Fixed, transparent over hero) ===== */
    .hdr{
      position:fixed;top:0;left:50%;transform:translateX(-50%);
      width:100%;max-width:480px;height:var(--hdr);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 var(--pad);z-index:100;
      background:rgba(255,255,255,0);
      backdrop-filter:blur(0px);-webkit-backdrop-filter:blur(0px);
      color:var(--white);
      transition:background-color .25s ease,color .25s ease,backdrop-filter .25s ease,border-color .25s;
      border-bottom:1px solid transparent;
    }
    .hdr.scrolled{
      background:rgba(255,255,255,.6);
      backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
      color:var(--g900);
      border-bottom-color:rgba(0,0,0,.04);
    }
    .hdr-title{font-size:18px;font-weight:700;color:inherit}
    .hdr-icons{display:flex;gap:16px;align-items:center}
    .hdr-icons button{width:24px;height:24px;display:flex;align-items:center;justify-content:center;color:inherit}
    .hdr-icons button svg{width:24px;height:24px;display:block;color:inherit}

    /* Main — QnA가 하단까지 감싸므로 main 자체엔 padding-bottom 두지 않음 */
    .main{padding-top:0;padding-bottom:0;background:var(--white)}

    /* ===== Hero Carousel (extends into header) ===== */
    .hero{position:relative;overflow:hidden;touch-action:pan-y;background:var(--g900);height:320px}
    .hero-track{display:flex;height:100%;will-change:transform}
    .hero-track.animate{transition:transform .4s cubic-bezier(.25,.46,.45,.94)}
    .hero-slide{flex:0 0 100%;width:100%;height:100%;background-size:cover;background-position:center;position:relative;cursor:pointer}
    /* 딤드 강화: 상단 0.55 → 중간 0.1 → 하단 0.72 */
    .hero-slide::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.55) 0%,rgba(0,0,0,.1) 45%,rgba(0,0,0,.72) 100%);pointer-events:none}
    .slide-inner{position:absolute;bottom:54px;left:var(--pad);right:var(--pad);z-index:2}
    .slide-tags{display:flex;gap:6px;margin-bottom:12px}
    .slide-tags img{height:20px;width:auto}
    .slide-tag-event{display:inline-flex;align-items:center;height:20px;padding:0 8px;font-size:11px;font-weight:700;letter-spacing:.02em;color:var(--white);border:1px solid rgba(255,255,255,.55);border-radius:4px;background:rgba(255,255,255,.12);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
    .slide-title{font-size:22px;font-weight:700;color:var(--white);line-height:1.35;word-break:keep-all}
    /* 도트 인디케이터 - 좌측 정렬 (텍스트와 동일한 라인) */
    .hero-dots{position:absolute;bottom:24px;left:var(--pad);display:flex;gap:6px;z-index:2}
    .hero-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);transition:all .3s}
    .hero-dot.on{width:18px;border-radius:3px;background:var(--white)}

    /* Section — 기본 섹션 간 여백 40px */
    .sec{padding:40px var(--pad) 0}
    .sec-label{font-size:13px;font-weight:500;color:var(--g500);margin-bottom:2px}
    .sec-title{font-size:20px;font-weight:700;line-height:1.35}
    .sec-hd{margin-bottom:14px}

    /* Popular — 히어로 → 인기게시물 여백 32px, 좌측 16px 여백 */
    .pop-sec{padding:32px 0 0}
    .pop-sec .sec-hd{padding:0 var(--pad)}
    .pop-track{display:flex;gap:12px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;padding:0 var(--gutter);scroll-padding-left:var(--gutter)}
    .pop-track::-webkit-scrollbar{display:none}
    .pop-card{flex:0 0 45%;scroll-snap-align:start;display:block}
    .pop-thumb{width:100%;aspect-ratio:3/2;border-radius:12px;background-size:cover;background-position:center;margin-bottom:10px}
    .pop-title{font-size:15px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

    /* Insights */
    .ins-box{background:var(--white);border-radius:16px;border:1px solid var(--g200);overflow:hidden;padding:24px 16px 20px}
    .ins-tabs{display:flex;gap:6px;overflow-x:auto;margin:0 -16px 16px;padding:0 16px;-ms-overflow-style:none;scrollbar-width:none}
    .ins-tabs::-webkit-scrollbar{display:none}
    .tab-pill{flex-shrink:0;padding:10px 12px;font-size:13px;font-weight:600;border-radius:20px;background:#F6F7F8;color:#3E434B;transition:all .2s;white-space:nowrap}
    .tab-pill.on{background:#292C32;color:#fff}
    .ins-list{min-height:380px;position:relative;display:flex;flex-direction:column;gap:12px}
    .ins-list.loading .ins-item{opacity:0;transform:translateY(8px)}
    .ins-item{display:flex;align-items:center;gap:14px;transition:opacity .25s,transform .25s}
    .ins-item:nth-child(1){transition-delay:0s}
    .ins-item:nth-child(2){transition-delay:.04s}
    .ins-item:nth-child(3){transition-delay:.08s}
    .ins-item:nth-child(4){transition-delay:.12s}
    .ins-item:nth-child(5){transition-delay:.16s}
    .ins-thumb{flex-shrink:0;width:100px;height:68px;border-radius:8px;background-size:cover;background-position:center;background-color:var(--g100)}
    .ins-title{font-size:15px;font-weight:500;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .btn-more-wrap{margin-top:16px}
    .btn-more{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:14px;font-size:14px;font-weight:500;color:var(--g800);background:#F6F7F8;border-radius:10px;transition:background .15s}
    .btn-more:active{background:var(--g100)}
    .btn-more svg{width:16px;height:16px;transition:transform .5s}
    .btn-more.spin svg{transform:rotate(360deg)}
    .btn-more-cnt{color:var(--g500);font-weight:400}

    /* Lounge */
    .lounge{overflow:hidden}
    .mq-row{overflow:hidden;padding:5px 0;touch-action:pan-y;-webkit-mask-image:linear-gradient(to right,transparent 0%,#000 5%,#000 95%,transparent 100%);mask-image:linear-gradient(to right,transparent 0%,#000 5%,#000 95%,transparent 100%)}
    .mq-track{display:flex;gap:8px;width:max-content;will-change:transform}
    .chip{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:8px 16px 8px 8px;border:1px solid var(--g200);border-radius:100px;background:var(--white);white-space:nowrap;font-size:14px;font-weight:500}
    .chip-emoji{width:24px;height:24px;flex-shrink:0}

    /* QnA — 좌측 16px 여백 */
    .qna-wrap{background:#F0F2FA;padding:32px 0 calc(var(--nav) + var(--safe) + 32px);margin-top:40px}
    .qna-inner{padding:0 var(--pad)}
    .qna-label{font-size:13px;font-weight:500;color:var(--g500);margin-bottom:2px}
    .qna-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .qna-link{display:flex;align-items:center;gap:2px}
    .qna-link svg{width:20px;height:20px;color:var(--g400)}
    .qna-scroll{overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;padding:0 var(--gutter);scroll-padding-left:var(--gutter)}
    .qna-scroll::-webkit-scrollbar{display:none}
    .qna-track{display:flex;gap:10px;width:max-content}
    .qcard{flex-shrink:0;width:188px;height:180px;background:var(--white);border-radius:14px;padding:16px;scroll-snap-align:start;display:flex;flex-direction:column;gap:10px}
    .qcard-tags{display:flex;gap:4px;flex-wrap:wrap}
    .qcard-tag{font-size:11px;font-weight:600;padding:2px 6px;border-radius:4px;background:#F6F7F8;color:#768091}
    .qcard-tag.hot{background:#F0F2FA;color:#1B55F6}
    .qcard-txt{font-size:15px;font-weight:600;line-height:1.45;flex:1;display:-webkit-box;-webkit-line-clamp:3;line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;word-break:keep-all}
    .qcard-views{font-size:12px;color:var(--g500)}

    /* Bottom Nav */
    .bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--white);border-top:1px solid var(--g200);display:flex;padding-bottom:var(--safe);z-index:100}
    .bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0 6px;font-size:11px;font-weight:500;color:var(--g400);transition:color .15s}
    .bnav-item.on{color:var(--g900)}
    .bnav-item svg{width:24px;height:24px;display:block;color:inherit}
  </style>
</head>
<body>
<div class="app">

        </svg>
      </button>
    </div>
  </header>

  <main class="main">

    <!-- ======= Hero Carousel ======= -->
    <section class="hero" id="hero">
      <div class="hero-track" id="heroTrack"></div>
      <div class="hero-dots" id="heroDots"></div>
    </section>

    <!-- ======= 인기 게시물 ======= -->

    <!-- ======= 함께하는 고민해결 ======= -->

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>

      <div class="qna-scroll" id="qnaScroll">

  <!-- Bottom Nav -->
  <nav class="bnav">

/* ===== HERO (Infinite Loop Carousel) ===== */
var heroEl = document.getElementById('hero');
var heroTrack = document.getElementById('heroTrack');
var heroDots = document.getElementById('heroDots');
var hLen = heroData.length;
// 실제 인덱스 = vIdx - 1 (clone 앞 1개 때문)
// track: [last-clone, 0, 1, 2, ..., n-1, first-clone]
var vIdx = 1; // 처음에 보여지는 실제 첫 슬라이드의 가상 인덱스
var hAuto = null, hDrag = false, hStartX = 0, hDeltaX = 0, hAnimating = false;

function buildSlide(s){
  var d = document.createElement('a');
  d.className = 'hero-slide';
  d.href = 'article.html?id=' + s.id;
  d.style.backgroundImage = 'url(' + s.img + ')';
  var tagsHtml = s.tags.map(function(t){
    if(t === 'tagEvent') return '<span class="slide-tag-event">EVENT</span>';
    return '<img src="svg/'+t+'.svg" alt="">';
  }).join('');
  d.innerHTML = '<div class="slide-inner"><div class="slide-tags">' + tagsHtml +
    '</div><h2 class="slide-title">'+s.title.replace(/\n/g,'<br>')+'</h2></div>';
  return d;
}
// 앞 clone (마지막 슬라이드)
heroTrack.appendChild(buildSlide(heroData[hLen-1]));
// 실제 슬라이드
heroData.forEach(function(s,i){
  heroTrack.appendChild(buildSlide(s));
  var dot = document.createElement('span');
  dot.className = 'hero-dot' + (i===0?' on':'');
  heroDots.appendChild(dot);
});
// 뒤 clone (첫 슬라이드)
heroTrack.appendChild(buildSlide(heroData[0]));
var dots = heroDots.children;

// 초기 위치 세팅 (clone 스킵)
heroTrack.style.transform = 'translateX(-'+(vIdx*100)+'%)';

function realIndex(){ return ((vIdx - 1) % hLen + hLen) % hLen; }

function updateDots(){
  var real = realIndex();
  for(var i=0;i<dots.length;i++) dots[i].classList.toggle('on', i===real);
}

function hGo(next){
  if(hAnimating) return;
  hAnimating = true;
  vIdx = next;
  heroTrack.classList.add('animate');
  heroTrack.style.transform = 'translateX(-'+(vIdx*100)+'%)';
  updateDots();
}

// transitionend 시 clone 영역이면 애니메이션 없이 점프
heroTrack.addEventListener('transitionend', function(){
  hAnimating = false;
  if(vIdx === 0){
    // 맨 앞 clone 도달 → 진짜 마지막으로 점프
    vIdx = hLen;
    heroTrack.classList.remove('animate');
    heroTrack.style.transform = 'translateX(-'+(vIdx*100)+'%)';
  } else if(vIdx === hLen + 1){
    // 맨 뒤 clone 도달 → 진짜 첫번째로 점프
    vIdx = 1;
    heroTrack.classList.remove('animate');
    heroTrack.style.transform = 'translateX(-'+(vIdx*100)+'%)';
  }
});

function hStart(){hStop();hAuto=setInterval(function(){hGo(vIdx+1)},3000)}
function hStop(){if(hAuto){clearInterval(hAuto);hAuto=null}}

heroEl.addEventListener('touchstart',function(e){
  hStop();
  hStartX=e.touches[0].clientX;
  hDrag=true;
  heroTrack.classList.remove('animate');
},{passive:true});
heroEl.addEventListener('touchmove',function(e){
  if(!hDrag)return;
  hDeltaX=e.touches[0].clientX-hStartX;
  heroTrack.style.transform='translateX(calc(-'+(vIdx*100)+'% + '+hDeltaX+'px))';
},{passive:true});
heroEl.addEventListener('touchend',function(){
  if(!hDrag)return;
  hDrag=false;
  heroTrack.classList.add('animate');
  if(Math.abs(hDeltaX)>40){
    hGo(hDeltaX>0?vIdx-1:vIdx+1);
  } else {
    heroTrack.style.transform='translateX(-'+(vIdx*100)+'%)';
  }
  hDeltaX=0;
  hStart();
});
hStart();

function getAllInsight(){
  // 카테고리별 라운드로빈으로 섞기 (dev→design→plan→mkt→dev→...)
  var cats = ['dev','design','plan','mkt'];
  var all = [];
  var maxLen = 0;
  cats.forEach(function(c){ if(insightData[c].length > maxLen) maxLen = insightData[c].length; });
  for(var i=0; i<maxLen; i++){
    cats.forEach(function(c){
      if(i < insightData[c].length) all.push(insightData[c][i]);
    });
  }
  return all;
}
function getInsightPool(cat){return cat==='all'?getAllInsight():(insightData[cat]||[])}

function renderInsight(){
  var pool = getInsightPool(insCat);
  var start = insBatch * 5;
  var items = pool.slice(start, start + 5);
  insList.classList.add('loading');
  setTimeout(function(){
    var html = '';
    items.forEach(function(a){
      html += '<a class="ins-item" href="article.html?id='+a.id+'"><div class="ins-thumb" style="background-image:url('+a.img+')"></div><p class="ins-title">'+a.t+'</p></a>';
    });
    insList.innerHTML = html;
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        insList.classList.remove('loading');
      });
    });
  },150);
  moreCnt.textContent = insBatch + '/2';
  var pool2 = getInsightPool(insCat);
  var maxBatch = Math.floor(pool2.length / 5) - 1;
  btnMore.style.display = (insBatch >= 2 || insBatch >= maxBatch) ? 'none' : '';
}

});

/* ===== LOUNGE MARQUEE (자동 롤링 + 터치 수동 제어) ===== */
function setupMarquee(rowId, direction, durationSec){
  var row = document.getElementById(rowId);
  var track = row.querySelector('.mq-track');
  var pos = 0, halfWidth = 0, speed = 0;
  var running = true, dragging = false;
  var startX = 0, startPos = 0, lastX = 0, lastT = 0, velocity = 0;
  var rafId = null;

  function measure(){
    var prev = halfWidth;
    halfWidth = track.scrollWidth / 2;
    speed = halfWidth / (durationSec * 60); // px/frame @ ~60fps
    if(prev === 0 || !isFinite(pos)){
      pos = direction === 'right' ? -halfWidth : 0;
      apply();
    }
  }
  function apply(){ track.style.transform = 'translateX(' + pos + 'px)'; }
  function wrap(){
    while(pos > 0) pos -= halfWidth;
    while(pos < -halfWidth) pos += halfWidth;
  }
  function tick(){
    if(!running){ rafId = null; return; }
    // 관성 감쇠 (drag 직후 잠깐 이어짐)
    if(Math.abs(velocity) > 0.1){
      pos += velocity;
      velocity *= 0.92;
    } else {
      velocity = 0;
      pos += direction === 'right' ? speed : -speed;
    }
    wrap();
    apply();
    rafId = requestAnimationFrame(tick);
  }
  function start(){ if(!rafId) rafId = requestAnimationFrame(tick); }

  row.addEventListener('touchstart', function(e){
    running = false;
    dragging = true;
    startX = lastX = e.touches[0].clientX;
    lastT = Date.now();
    startPos = pos;
    velocity = 0;
  }, {passive:true});

  row.addEventListener('touchmove', function(e){
    if(!dragging) return;
    var x = e.touches[0].clientX;
    var now = Date.now();
    var dt = now - lastT;
    if(dt > 0) velocity = (x - lastX) / dt * 16; // px/frame 대략치
    lastX = x;
    lastT = now;
    pos = startPos + (x - startX);
    wrap();
    apply();
  }, {passive:true});

  function release(){
    if(!dragging) return;
    dragging = false;
    running = true;
    start();
  }
  row.addEventListener('touchend', release);
  row.addEventListener('touchcancel', release);

  measure();
  // 이미지/폰트 로드 후 재측정
  window.addEventListener('load', measure);
  setTimeout(measure, 300);
  setTimeout(measure, 1000);

  start();
}

setupMarquee('mqTop', 'right', 30);
setupMarquee('mqBot', 'left', 26);

/* ===== QNA ===== */
var qnaTrack = document.getElementById('qnaTrack');
var qnaScroll = document.getElementById('qnaScroll');

function shuffle(arr){
  var a = arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j = Math.floor(Math.random()*(i+1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function renderQna(jobFilter){
  // 직무글 필터링 (전체 탭은 전 직무 합친 뒤 셔플)
  var jobs;
  if(!jobFilter || jobFilter === 'all'){
    jobs = shuffle(qnaData);
  } else {
    jobs = qnaData.filter(function(q){return q.job === jobFilter});
    if(jobs.length === 0) jobs = qnaData.slice();
  }
  // 테마글↔직무글 교차 배치 (UT 관심도 테스트를 위해 앞쪽에 번갈아 노출)
  // 결과: theme[0], job[0], theme[1], job[1], ..., theme[N], job[N], 이후 남은 직무글
  var interleaved = [];
  var maxPair = themeData.length;
  for(var i=0; i<maxPair; i++){
    if(i < themeData.length) interleaved.push(themeData[i]);
    if(i < jobs.length) interleaved.push(jobs[i]);
  }
  for(var j=maxPair; j<jobs.length; j++){
    interleaved.push(jobs[j]);
  }
  // 무한 롤링용 2배 복제
  var items = interleaved.concat(interleaved);
  var html = '';
  items.forEach(function(q){
    html += '<a class="qcard" href="qna.html?id='+q.id+'"><div class="qcard-tags">' +
      q.tags.map(function(t){
        var isHot = t === '인기글';
        return '<span class="qcard-tag'+(isHot?' hot':'')+'">'+t+'</span>';
      }).join('') +
      '</div><p class="qcard-txt">'+q.txt+'</p><span class="qcard-views">조회수 '+q.views+'</span></a>';
  });
  qnaTrack.innerHTML = html;
}

var qnaReset = false;
qnaScroll.addEventListener('scroll',function(){
  if(qnaReset) return;
  var half = qnaTrack.scrollWidth / 2;
  if(qnaScroll.scrollLeft >= half - 5){
    qnaReset = true;
    qnaScroll.scrollLeft -= half;
    requestAnimationFrame(function(){qnaReset=false});
  }
},{passive:true});

renderQna();

/* ===== HEADER SCROLL TRANSITION ===== */
var hdr = document.getElementById('hdr');
function onScroll(){
  // Trigger at ~40% of hero height (so transition feels natural)
  var threshold = Math.max(80, heroEl.offsetHeight * 0.4);
  hdr.classList.toggle('scrolled', window.scrollY > threshold);
}
window.addEventListener('scroll', onScroll, {passive:true});
window.addEventListener('resize', onScroll, {passive:true});
onScroll();

})();
