<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FFFFFF">
  <title>콘텐츠 상세 - 잡코리아</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
  <style>
    :root{
      --g900:#222;--g800:#444;--g700:#666;--g600:#888;--g500:#999;
      --g400:#BBB;--g300:#D1D1D1;--g200:#E8E8E8;--g100:#F4F4F4;--g50:#F7F7F7;
      --white:#FFF;--black:#000;
      --blue:#3182F6;--red:#E8553D;
      --hdr:48px;--safe:env(safe-area-inset-bottom,0px);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{-webkit-text-size-adjust:100%}
    body{font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,Roboto,sans-serif;color:var(--g900);background:var(--white);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
    a{text-decoration:none;color:inherit}
    button{border:none;background:none;font:inherit;cursor:pointer;color:inherit}
    img{display:block;max-width:100%}

    .app{max-width:480px;margin:0 auto;position:relative;min-height:100dvh;background:var(--white)}

    /* Header */
    .hdr{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:var(--hdr);background:var(--white);display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:100;border-bottom:1px solid var(--g200)}
    .hdr-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%}
    .hdr-btn:active{background:var(--g50)}
    .hdr-btn svg{width:24px;height:24px}
    .hdr-right{display:flex;gap:4px}

    /* Main */
    .main{padding-top:var(--hdr);padding-bottom:calc(60px + var(--safe))}

    /* Meta */
    .meta{padding:16px 20px 12px;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--g500)}
    .meta-dot{width:2px;height:2px;border-radius:50%;background:var(--g400)}

    /* Title */
    .art-title{padding:0 20px;font-size:22px;font-weight:700;line-height:1.4;word-break:keep-all}

    /* Stats */
    .stats{padding:10px 20px 0;display:flex;gap:12px;font-size:13px;color:var(--g500)}
    .stats span{display:flex;align-items:center;gap:3px}
    .stats svg{width:14px;height:14px}

    /* Hero Image */
    .art-hero{margin:20px 20px 0;border-radius:12px;overflow:hidden;aspect-ratio:16/9;background:#eee}
    .art-hero img{width:100%;height:100%;object-fit:cover}

    /* Body */
    .art-body{padding:24px 20px;font-size:16px;line-height:1.75;color:var(--g800);word-break:keep-all}
    .art-body p{margin-bottom:20px}
    .art-body p:last-child{margin-bottom:0}
    .art-body h3{font-size:18px;font-weight:700;color:var(--g900);margin:32px 0 12px}
    .art-body blockquote{margin:20px 0;padding:16px 20px;background:var(--g50);border-left:3px solid var(--g300);border-radius:0 8px 8px 0;font-size:15px;color:var(--g700);line-height:1.6}

    /* Tags */
    .art-tags{display:flex;gap:8px;padding:0 20px 20px;flex-wrap:wrap}
    .art-tag{display:inline-block;padding:6px 14px;border-radius:20px;background:var(--g50);border:1px solid var(--g200);font-size:13px;font-weight:500;color:var(--g700)}

    /* Divider */
    .divider{height:8px;background:var(--g50)}

    /* Comment Section */
    .cmt-section{padding:20px}
    .cmt-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .cmt-title{font-size:16px;font-weight:700}
    .cmt-count{font-size:14px;color:var(--g500);margin-left:6px;font-weight:400}
    .cmt-sort{font-size:13px;color:var(--g500)}

    .cmt-item{display:flex;gap:10px;padding:14px 0;border-bottom:1px solid var(--g100)}
    .cmt-item:last-child{border-bottom:none}
    .cmt-avatar{flex-shrink:0;width:32px;height:32px;border-radius:50%;background:var(--g100);display:flex;align-items:center;justify-content:center}
    .cmt-avatar svg{width:18px;height:18px;color:var(--g400)}
    .cmt-body{flex:1;min-width:0}
    .cmt-author{font-size:13px;font-weight:600;margin-bottom:2px}
    .cmt-text{font-size:14px;line-height:1.55;color:var(--g800)}
    .cmt-meta{display:flex;gap:12px;margin-top:6px;font-size:12px;color:var(--g500)}
    .cmt-meta button{font-size:12px;color:var(--g500);display:flex;align-items:center;gap:3px}
    .cmt-meta button svg{width:14px;height:14px}

    /* Bottom Bar */
    .bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--white);border-top:1px solid var(--g200);display:flex;align-items:center;gap:12px;padding:10px 16px;padding-bottom:calc(10px + var(--safe));z-index:100}
    .cmt-input{flex:1;height:40px;border:1px solid var(--g200);border-radius:20px;padding:0 16px;font-size:14px;outline:none;background:var(--g50);transition:border-color .2s}
    .cmt-input:focus{border-color:var(--blue);background:var(--white)}
    .cmt-input::placeholder{color:var(--g400)}
    .send-btn{width:36px;height:36px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.4;transition:opacity .2s}
    .send-btn.active{opacity:1}
    .send-btn svg{width:18px;height:18px;color:var(--white)}

    /* Actions row */
    .actions{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--g100)}
    .act-left{display:flex;gap:16px}
    .act-btn{display:flex;align-items:center;gap:4px;font-size:13px;color:var(--g600)}
    .act-btn svg{width:20px;height:20px}
    .act-btn.liked svg{color:var(--red);fill:var(--red)}
  </style>
</head>

  <main class="main" id="mainContent">

    </button>
  </div>

</div>

<script>
(function(){
'use strict';

var U = 'https://picsum.photos/seed/';

/* ===== ALL ARTICLES ===== */
var articles = {
  /* Hero */
  1:{title:'나에게 맞는 복지를 찾는 게 진짜 이직 전략',date:'2025.10.20',cat:'비즈니스/테크',views:196,cmts:62,likes:13,img:U+'welfare/800/420',
    body:'<p>이직을 결심할 때 우리는 주로 연봉, 직무, 회사 규모 등을 떠올립니다. 하지만 최근 취업 시장에서 가장 주목받는 키워드는 단연 \'복지\'입니다. 특히 MZ세대 직장인들 사이에서 복지 혜택은 단순한 부가 요소가 아닌, 회사를 선택하는 핵심 기준이 되었습니다.</p><h3>왜 복지가 중요해졌나</h3><p>과거에는 "연봉만 높으면 된다"는 생각이 지배적이었습니다. 하지만 워라밸의 중요성이 강조되면서, 유연근무제, 재택근무, 자기계발 지원금 같은 복지 항목이 이직의 주요 동기가 되고 있습니다.</p><blockquote>연봉이 500만원 높은 회사보다, 재택근무와 자율 출퇴근이 가능한 회사를 선택한 직장인이 올해 30% 증가했습니다. — 잡코리아 2025 이직 리포트</blockquote><h3>나에게 맞는 복지 찾는 법</h3><p>모든 사람에게 좋은 복지는 다릅니다. 육아 중인 직장인에게는 어린이집 지원이, 자기계발에 관심 있는 직장인에게는 교육비 지원이 더 가치 있을 수 있습니다. 중요한 것은 내 라이프스타일과 우선순위에 맞는 복지를 파악하는 것입니다.</p><p>이직 전 반드시 확인해야 할 복지 체크리스트: 유연근무제 유무, 자기계발 지원금, 건강검진 및 의료비 지원, 장기근속 리프레시 휴가, 주거 지원 혜택 등을 꼼꼼히 확인해보세요. 잡코리아 기업리뷰에서 실제 재직자의 복지 만족도를 확인할 수 있습니다.</p>',
    tags:['이직전략','복지','MZ세대','워라밸']},
  2:{title:'MZ세대가 원하는 회사의 조건 5가지',date:'2025.10.18',cat:'커리어',views:312,cmts:45,likes:28,img:U+'mzwork/800/420',
    body:'<p>MZ세대가 회사를 선택할 때 가장 중요하게 보는 것은 무엇일까요? 잡코리아가 2,000명의 MZ세대 직장인을 대상으로 설문한 결과, 의외의 답변들이 나왔습니다.</p><h3>1. 수평적 조직문화</h3><p>가장 높은 응답률(78%)을 기록한 것은 수평적 조직문화였습니다. 직급이 아닌 역할 중심의 소통, 자유로운 의견 개진이 가능한 환경을 가장 중요하게 여겼습니다.</p><h3>2. 성장 가능성</h3><p>두 번째는 개인의 성장 가능성(72%)이었습니다. 단순 반복 업무가 아닌, 새로운 역량을 쌓을 수 있는 환경을 원합니다.</p><h3>3. 유연한 근무 방식</h3><p>세 번째는 유연근무제(68%)입니다. 재택근무, 시차출근 등 시간과 장소에 구애받지 않는 근무 환경이 중요합니다.</p><h3>4. 공정한 보상</h3><p>네 번째는 공정한 평가와 보상(65%)입니다. 성과에 비례한 보상 체계가 있는 회사를 선호합니다.</p><h3>5. 일의 의미</h3><p>다섯 번째는 일의 의미와 사회적 가치(58%)입니다. 자신의 업무가 사회에 어떤 영향을 미치는지 중요하게 생각합니다.</p>',
    tags:['MZ세대','조직문화','직장','트렌드']},
  3:{title:'이직 후 100일, 새 회사 적응의 기술',date:'2025.10.15',cat:'커리어',views:254,cmts:38,likes:22,img:U+'newjob/800/420',
    body:'<p>이직에 성공했다면 이제 시작입니다. 새 회사에서의 첫 100일은 당신의 커리어를 결정짓는 골든타임입니다. 이직 후 적응에 실패하는 사람들의 공통점과, 성공하는 사람들의 전략을 알아보겠습니다.</p><h3>첫 30일: 관찰하고 질문하라</h3><p>새 조직에서 가장 먼저 해야 할 것은 조직의 암묵적 규칙을 파악하는 것입니다. 회의 문화, 소통 방식, 의사결정 구조 등을 관찰하세요. 모르는 것이 있으면 적극적으로 질문하되, 기존 방식을 비판하는 것은 피하세요.</p><h3>30~60일: 작은 성과를 만들어라</h3><p>빠르게 가시적인 성과를 보여주는 것이 중요합니다. 큰 프로젝트가 아니더라도, 맡은 업무에서 신뢰를 쌓을 수 있는 작은 성공을 만들어 가세요.</p><blockquote>이직 후 적응에 실패하는 가장 큰 이유는 "이전 회사에서는 이렇게 했는데..."라는 태도입니다.</blockquote><h3>60~100일: 관계를 넓혀라</h3><p>직속 팀을 넘어 다른 부서와의 네트워크를 만들어 가세요. 점심 한 끼의 힘을 무시하지 마세요. 이 시기에 형성된 인맥이 이후 업무 추진의 든든한 자산이 됩니다.</p>',
    tags:['이직','적응','신입','직장생활']},
  4:{title:'개발자 커리어 로드맵 완벽 가이드',date:'2025.10.12',cat:'테크',views:487,cmts:95,likes:67,img:U+'devroad/800/420',
    body:'<p>소프트웨어 개발자로서 커리어를 시작한 지 얼마 안 되었거나, 현재 커리어의 방향에 대해 고민하고 계신가요? 이 글에서는 주니어부터 시니어, 그리고 그 이후까지의 개발자 커리어 로드맵을 상세히 안내합니다.</p><h3>주니어 개발자 (0~3년)</h3><p>이 시기의 핵심은 기본기를 다지는 것입니다. 하나의 언어와 프레임워크에 집중하되, CS 기본 지식(자료구조, 알고리즘, 네트워크)을 꾸준히 학습하세요. 코드 리뷰에 적극적으로 참여하고, 선배 개발자의 코드를 읽는 습관을 들이세요.</p><h3>미드레벨 개발자 (3~7년)</h3><p>설계 능력과 문제 해결 역량을 키워야 합니다. 기술적 의사결정에 참여하고, 시스템 아키텍처에 대한 이해를 넓혀가세요. 이 시기에 기술 블로그 작성이나 오픈소스 기여를 시작하면 시니어로의 전환에 큰 도움이 됩니다.</p><h3>시니어 개발자 (7년~)</h3><p>기술적 리더십이 핵심입니다. 팀의 기술적 방향을 설정하고, 주니어 개발자를 멘토링하는 역할을 맡게 됩니다. 이 시점에서 IC(Individual Contributor) 트랙과 매니지먼트 트랙 중 선택을 고민하게 됩니다.</p>',
    tags:['개발자','커리어','로드맵','성장']},
  5:{title:'면접관이 진짜 보는 것들, 현직자가 알려주는 팁',date:'2025.10.10',cat:'취업',views:623,cmts:128,likes:89,img:U+'interview/800/420',
    body:'<p>면접장에서 지원자가 보는 것과 면접관이 보는 것은 완전히 다릅니다. 대기업, 스타트업에서 10년간 면접관으로 활동해 온 현직 인사담당자가 면접의 진짜 평가 기준을 공개합니다.</p><h3>스펙보다 중요한 것</h3><p>이력서에 적힌 스펙은 이미 서류 단계에서 확인했습니다. 면접에서 보는 것은 그 이면의 스토리입니다. "이 프로젝트에서 당신의 역할은 무엇이었고, 어떤 어려움이 있었으며, 어떻게 해결했나요?"라는 질문에 구체적으로 답할 수 있어야 합니다.</p><blockquote>면접에서 가장 좋은 인상을 주는 것은 "모르지만, 이렇게 접근해보겠습니다"라는 솔직한 태도입니다.</blockquote><h3>문화 적합성</h3><p>많은 회사가 Culture Fit을 중요하게 봅니다. 우리 팀과 잘 어울릴 수 있는 사람인지, 조직의 가치관과 일치하는지를 판단합니다. 이를 위해 "갈등 상황에서 어떻게 대처했나요?" 같은 행동 면접 질문이 등장합니다.</p><h3>실전 팁</h3><p>면접 전 반드시 해당 회사의 최근 뉴스, 서비스, 경쟁사를 조사하세요. 질문할 기회가 주어지면 "입사 후 첫 3개월 동안 어떤 업무를 맡게 되나요?"처럼 구체적인 질문을 준비하세요. 이는 진정한 관심을 보여줍니다.</p>',
    tags:['면접','취업','인사담당자','팁']},

  6:{title:'햄버거 맛은 기본, 성장에도 진심인 맥도날드',date:'2025.10.19',cat:'기업 인사이트',views:156,cmts:42,likes:18,img:U+'mcdonalds/800/420',
    body:'<p>전 세계 120개국, 4만여 개 매장을 운영하는 맥도날드. 누구나 아는 패스트푸드 브랜드지만, 의외로 직원 성장에 진심인 기업이라는 사실을 아시나요?</p><h3>체계적인 교육 시스템</h3><p>맥도날드는 \'햄버거 유니버시티\'라 불리는 자체 교육기관을 운영합니다. 1961년 설립된 이 교육센터에서는 매년 5,000명 이상의 매니저가 리더십 교육을 받습니다. 매장 운영부터 비즈니스 전략까지 체계적인 커리큘럼을 갖추고 있습니다.</p><h3>아르바이트에서 CEO까지</h3><p>현재 맥도날드 임원의 50% 이상이 크루(아르바이트)로 시작했습니다. 대표적으로 전 글로벌 CEO 짐 스키너는 레스토랑 매니저 출신입니다. 이처럼 맥도날드는 내부 승진 문화가 매우 강합니다.</p><blockquote>"맥도날드에서 일한다는 것은 단순히 햄버거를 파는 것이 아닙니다. 팀워크, 리더십, 고객 서비스의 기본을 배우는 것입니다." — 맥도날드 코리아 인사팀</blockquote><p>만약 외식업계 커리어에 관심이 있다면, 맥도날드는 단순한 아르바이트를 넘어 체계적인 성장의 기회를 제공하는 기업입니다.</p>',
    tags:['맥도날드','기업분석','성장','외식업계']},
  7:{title:'이직에 골든타임이 있을까요?',date:'2025.10.17',cat:'커리어',views:412,cmts:78,likes:56,img:'https://picsum.photos/seed/goldentime/800/420',
    body:'<p>"지금 이직해도 될까요?" 커리어 상담에서 가장 많이 듣는 질문입니다. 정답은 없지만, 경험 많은 헤드헌터와 HR 전문가들이 말하는 "골든타임"은 분명히 존재합니다.</p><h3>연차별 이직 시장의 온도</h3><p>1~3년차는 가장 수요가 높은 시기입니다. 회사 입장에서 "훈련비용이 덜 들면서 실무가 가능한" 인재를 찾기 때문입니다. 4~7년차는 리드 포지션 후보로 프리미엄이 붙고, 8년차 이상은 전문성과 리더십을 함께 요구받습니다.</p><blockquote>"이직 타이밍은 \'내가 할 수 있는 것보다 조금 높은 자리\'가 열렸을 때입니다. 딱 맞는 자리는 오히려 성장의 기회가 아닐 수 있어요." — 10년차 HR 리더</blockquote><h3>업계별 채용 시즌</h3><p>IT는 연초(1~3월)와 하반기(9~10월), 금융·대기업은 공채 시즌에 맞춰 움직입니다. 다만 "내가 준비된 시점"이 최고의 타이밍이라는 원칙은 변하지 않습니다.</p><h3>이직하면 안 되는 타이밍</h3><p>단순히 "지금 직장이 싫어서" 움직이는 것은 위험합니다. 다음 직장에 대한 명확한 기대치 없이 하는 이직은 또 다른 불만족으로 이어지기 쉽습니다.</p>',
    tags:['이직','커리어','타이밍','이직전략']},
  8:{title:'스타트업 vs 대기업, 나에게 맞는 선택은?',date:'2025.10.14',cat:'커리어',views:521,cmts:103,likes:71,img:img('photo-1486406146926-c627a92ad1ab',800,420),
    body:'<p>취업과 이직에서 가장 오래된 논쟁 중 하나: 스타트업과 대기업, 어디가 더 좋을까? 정답은 "당신이 누구냐에 따라 다르다"입니다.</p><h3>스타트업이 맞는 사람</h3><p>빠른 의사결정과 변화를 즐기는 사람, 하나의 전문 분야보다 다양한 경험을 원하는 사람, 직접적인 영향력을 행사하고 싶은 사람에게 스타트업이 맞습니다. 다만 "불확실성"을 견딜 수 있는 멘탈이 필수입니다.</p><h3>대기업이 맞는 사람</h3><p>체계적인 교육과 성장 프로세스를 원하는 사람, 전문 분야의 깊이를 키우고 싶은 사람, 안정적인 보상과 복지가 중요한 사람에게 대기업이 적합합니다. 단, 느린 의사결정과 관료주의에 대한 인내가 필요합니다.</p><blockquote>커리어 초기에는 대기업에서 기본기를 닦고, 이후 스타트업으로 이직하는 패턴이 최근 가장 인기 있습니다.</blockquote><p>중요한 것은 "지금 나에게 무엇이 가장 중요한가"입니다. 경험이 중요하다면 스타트업, 전문성이 중요하다면 대기업을 선택하세요. 그리고 커리어는 한 번의 선택으로 결정되지 않습니다.</p>',
    tags:['스타트업','대기업','이직','커리어']},
  9:{title:'세계 1위 푸드서비스 기업은 어떻게 인재를 키우는가?',date:'2025.10.11',cat:'기업 인사이트',views:337,cmts:58,likes:44,img:'https://picsum.photos/seed/globalfood/800/420',
    body:'<p>전 세계 100여 개국에서 40만 명 이상을 고용하는 글로벌 푸드서비스 기업. 단순히 "음식을 파는" 기업이 아니라, 체계적인 인재 육성으로 유명합니다. 그들의 인재 개발 비결을 들여다봅니다.</p><h3>모두에게 열린 리더십 교육</h3><p>매장 크루부터 글로벌 임원까지, 동일한 리더십 프레임워크로 교육합니다. "커뮤니케이션, 문제해결, 팀 운영"이라는 3대 역량을 단계별로 심화 학습하죠. 심지어 아르바이트생도 매뉴얼화된 트레이닝 과정을 거칩니다.</p><h3>내부 승진 DNA</h3><p>임원의 60% 이상이 현장 경력자입니다. "매장에서 시작한 사람이 CEO가 될 수 있다"는 문화는 단순한 구호가 아니라 실제 HR 정책으로 작동합니다.</p><blockquote>"우리가 판매하는 건 햄버거가 아니라 사람을 키우는 시스템입니다." — 전 글로벌 HR 수석 부사장</blockquote><h3>디지털 시대의 대응</h3><p>AI 기반 주문 시스템, 데이터 분석 툴, 글로벌 협업 플랫폼까지. 지점 단위로 디지털 역량 교육을 확대 중이며, 이는 그들의 장기 생존 전략이기도 합니다.</p>',
    tags:['글로벌기업','인재개발','HR','푸드서비스']},
  10:{title:'신입은 이력서 경력란을 비워도 되나요?',date:'2025.10.08',cat:'취업',views:623,cmts:144,likes:82,img:'https://picsum.photos/seed/newbieresume/800/420',
    body:'<p>신입 지원자들의 영원한 고민. 경력란에 쓸 게 없어서 공란으로 두어도 괜찮을까요? 결론부터 말하면, "절대 비우지 마세요."</p><h3>경력 = 정식 직장 경험이 아니다</h3><p>이력서의 "경력"은 인턴십, 동아리 프로젝트, 교내 공모전, 아르바이트에서의 직무 관련 경험 모두 포함될 수 있습니다. 중요한 건 "지원 직무와 어떤 연결점이 있는가"입니다.</p><h3>구체성이 진정성을 만든다</h3><p>"카페 아르바이트 2년"이 아닌, "하루 평균 200잔 주문 대응, 월 마감 정산 담당, 신메뉴 POS 세팅 경험"이라고 쓰세요. 숫자와 역할이 들어가면 인사담당자의 눈에 띕니다.</p><blockquote>"신입 이력서에서 경력란이 비어있으면, 그 회사가 당신을 어떻게 활용할지 상상하기 어려워집니다." — 잡코리아 인사팀</blockquote><h3>정말 경험이 없다면?</h3><p>그럴 땐 "관심 프로젝트" 섹션을 만들어 GitHub 레포, 개인 포트폴리오, 독학한 기술 등을 적극적으로 노출하세요. 중요한 건 "내가 무엇을 하려고 움직였는가"를 보여주는 것입니다.</p>',
    tags:['신입','이력서','취업','자소서']},
  11:{title:'퇴사 전에 이거 안 하면 전 직장에 흑역사 남음',date:'2025.10.06',cat:'직장생활',views:872,cmts:198,likes:124,img:'https://picsum.photos/seed/exitjob/800/420',
    body:'<p>아름다운 퇴사는 새 출발의 시작입니다. 하지만 많은 사람이 퇴사 과정에서 실수를 하고, 몇 년 뒤에도 전 직장 동료들 사이에서 "그때 그 사람"으로 회자됩니다. 절대 하지 말아야 할 퇴사 실수 TOP 5를 공유합니다.</p><h3>1. 갑자기 사라지기</h3><p>슬랙에서 "죄송합니다" 한 줄 남기고 사라지는 사람, 의외로 많습니다. 정식 퇴사 통보 없이 잠수하면 경력 증빙도 어렵고, 업계가 좁은 만큼 평판에 큰 타격을 줍니다.</p><h3>2. 인수인계 대충 하기</h3><p>"나 떠나면 끝"이라는 생각은 금물. 다음 담당자와 팀이 겪을 혼란은 당신의 이력서에 흔적으로 남습니다. 최소 2주는 체계적인 문서화와 실무 전달에 집중하세요.</p><blockquote>"퇴사할 때 보여주는 태도가 그 사람의 진짜 모습입니다. 같이 일해본 사람은 절대 잊지 않죠." — 15년차 인사팀장</blockquote><h3>3~5. 나머지 실수들</h3><p>회사 자료 외부 유출, SNS에 전 직장 험담 올리기, 동료들에게 뒤에서 뒷담화하기. 이 셋은 법적 문제까지 번질 수 있습니다. 명심하세요, 업계는 생각보다 좁습니다.</p>',
    tags:['퇴사','직장매너','커리어','인수인계']},
  12:{title:'직장인 자기계발, 퇴근 후 1시간의 힘',date:'2025.10.04',cat:'자기계발',views:205,cmts:28,likes:19,img:img('photo-1481627834876-b7833e8f5570',800,420),
    body:'<p>바쁜 직장인에게 자기계발의 시간을 내기란 쉽지 않습니다. 하지만 매일 퇴근 후 단 1시간만 투자해도, 1년이면 365시간이라는 놀라운 시간이 됩니다.</p><h3>1시간을 어떻게 쓸 것인가</h3><p>가장 효과적인 방법은 해당 시간을 "학습"과 "실천"으로 나누는 것입니다. 30분은 관련 분야의 책이나 아티클을 읽고, 나머지 30분은 배운 것을 직접 적용해 보세요.</p><h3>꾸준함의 비결</h3><p>동기부여에 의존하지 마세요. 대신 "퇴근 후 저녁 먹고, 커피 한 잔 내려서 책상에 앉는다"는 구체적인 루틴을 만드세요. 습관이 되면 의지력 없이도 자연스럽게 시작됩니다.</p><blockquote>1년 후의 나를 바꾸는 것은 하루 10시간의 벼락치기가 아니라, 매일 1시간의 꾸준한 투자입니다.</blockquote><p>중요한 것은 "완벽한 1시간"을 보내려 하지 않는 것입니다. 어떤 날은 30분만 해도 괜찮습니다. 그냥 매일 앉는 것이 핵심입니다.</p>',
    tags:['자기계발','직장인','성장','습관']},
  13:{title:'회사에서 인정받는 보고서 작성의 기술',date:'2025.10.02',cat:'비즈니스',views:189,cmts:34,likes:21,img:img('photo-1551288049-bebda4e38f71',800,420),
    body:'<p>같은 내용이라도 어떻게 보고하느냐에 따라 결과가 달라집니다. 상사를 설득하고 의사결정을 이끌어내는 보고서 작성의 핵심 기술을 알아봅니다.</p><h3>결론부터 말하라</h3><p>보고서의 첫 문장에 핵심 결론을 적으세요. "검토 결과, A안을 추천드립니다. 이유는 다음 3가지입니다."처럼 시작하면 읽는 사람이 전체 맥락을 빠르게 파악할 수 있습니다.</p><h3>숫자로 말하라</h3><p>"매출이 많이 늘었습니다"가 아닌 "전월 대비 매출 23% 증가"라고 써야 합니다. 구체적인 숫자는 신뢰를 만들고, 의사결정의 근거가 됩니다.</p><h3>So What? 테스트</h3><p>보고서의 모든 문장에 "그래서 뭐?"라고 물어보세요. 답이 나오지 않는 문장은 삭제하거나 수정해야 합니다. 모든 정보에는 목적이 있어야 합니다.</p>',
    tags:['보고서','비즈니스','직장생활','스킬']},
  14:{title:'연봉 협상에서 절대 하지 말아야 할 실수',date:'2025.09.30',cat:'커리어',views:445,cmts:89,likes:52,img:img('photo-1554224155-6726b3ff858f',800,420),
    body:'<p>연봉 협상은 커리어에서 가장 어렵고도 중요한 순간입니다. 많은 직장인이 연봉 협상에서 실수를 범하고, 그로 인해 수천만 원의 기회를 놓칩니다.</p><h3>실수 1: 먼저 숫자를 말하는 것</h3><p>절대 먼저 희망 연봉을 말하지 마세요. "현재 이 포지션의 연봉 범위가 어떻게 되나요?"라고 물어보세요. 상대방이 먼저 범위를 제시하면, 그 안에서 협상하는 것이 훨씬 유리합니다.</p><h3>실수 2: 현재 연봉만 기준으로 삼는 것</h3><p>이직 시 연봉 협상의 기준은 "현재 연봉 + α"가 아닌, 해당 포지션의 시장 가치입니다. 잡코리아 연봉정보, 블라인드 등을 통해 시장 연봉을 반드시 조사하세요.</p><blockquote>연봉 협상에서 가장 강력한 무기는 "다른 선택지가 있다"는 것입니다.</blockquote><h3>실수 3: 감정적으로 대응하는 것</h3><p>"이 정도밖에 안 되나요?"라는 반응은 금물입니다. 차분하게 "제가 가져올 수 있는 가치를 고려했을 때, 이 정도 수준이 적절하다고 생각합니다"라고 근거를 제시하세요.</p>',
    tags:['연봉','협상','이직','커리어']},
  15:{title:'[JOBKOREA DEVCON] AI 시대, 개발자 고민 완전 정복',date:'2025.09.28',cat:'이벤트',views:1342,cmts:231,likes:187,img:'https://picsum.photos/seed/devcon2025/800/420',
    body:'<p>잡코리아가 개발자들을 위해 준비한 단 하루. <strong>JOBKOREA DEVCON 2025</strong>가 11월 말 성수동에서 열립니다. AI 시대의 개발자 커리어에 대한 모든 고민, 이 컨퍼런스 하나로 해결하세요.</p><h3>어떤 이야기가 오가나요?</h3><p>• AI가 바꾸는 개발자의 일상과 생존 전략 (네이버, 카카오, 당근 시니어 개발자 패널 토크)<br>• Cursor, Claude Code로 생산성 10배 끌어올린 리얼 케이스<br>• 주니어가 시니어로 점프하는 포트폴리오 만들기<br>• 국내 Top 개발자들이 말하는 "다음 5년" 전망</p><blockquote>"AI는 개발자를 대체하는 것이 아니라, 개발자의 역할을 재정의합니다. DEVCON에서 그 답을 함께 찾아요." — 잡코리아 DEVCON 기획팀</blockquote><h3>참가 혜택</h3><p>무료 참가 신청, 라이브 QnA 세션 우선 질문권, 네트워킹 리셉션(연사 + 참가자), 공식 굿즈(후디·스티커·핸드북), 사후 세션 VOD 제공까지. 지원자 전원 대상으로 "1:1 커리어 멘토링 20분" 이벤트도 함께 진행됩니다.</p><h3>신청 방법</h3><p>잡코리아 앱 → 콘텐츠 → DEVCON 배너 클릭 → 간단한 응모 폼 작성 후 제출. 선착순 300명 한정이며, 11월 15일까지 접수합니다. 결과는 11월 20일 개별 안내 예정.</p>',
    tags:['DEVCON','이벤트','AI','개발자','잡코리아']},

  /* Insight articles */
  101:{title:'IT 베테랑이 말하는 승진의 물꼬를 트는 비결',date:'2025.10.20',cat:'AI·개발·데이터',views:234,cmts:45,likes:28,img:U+'itvet/800/420',
    body:'<p>IT업계에서 20년간 일하며 매니저에서 VP까지 올라간 현직자가 승진의 핵심 비결을 공유합니다.</p><h3>보이는 성과를 만들어라</h3><p>아무리 일을 잘해도 보이지 않으면 인정받기 어렵습니다. 주간 리포트, 팀 미팅에서의 발표, 사내 기술 세미나 등을 통해 자신의 성과를 가시화하세요.</p><h3>윗사람의 고민을 해결하라</h3><p>승진하는 사람은 자기 할 일을 잘하는 것을 넘어, 상사의 고민을 해결해주는 사람입니다. 팀장이 무엇을 걱정하는지 파악하고, 그에 대한 해결책을 선제적으로 제안하세요.</p><blockquote>승진은 과거의 성과에 대한 보상이 아니라, 다음 레벨에서 잘할 수 있다는 신뢰의 표현입니다.</blockquote><p>기술적 역량은 기본이고, 리더십과 커뮤니케이션 능력이 시니어 레벨로 갈수록 더 중요해집니다.</p>',
    tags:['승진','IT','커리어','리더십']},
  102:{title:'스타트업 CTO가 말하는 기술 면접 핵심',date:'2025.10.18',cat:'AI·개발·데이터',views:456,cmts:87,likes:59,img:U+'ctoint/800/420',
    body:'<p>스타트업 CTO로서 수백 명의 개발자를 면접한 경험을 바탕으로, 기술 면접에서 합격하는 사람의 공통점을 이야기합니다.</p><h3>코딩 테스트를 넘어서</h3><p>코딩 테스트는 기본 역량 확인용입니다. 진짜 면접은 시스템 설계 질문에서 시작됩니다. "트래픽이 10배 증가하면 어떻게 대응하시겠습니까?"에 대한 답변이 합불을 결정합니다.</p><h3>트레이드오프를 설명하라</h3><p>기술적 의사결정에서 중요한 것은 정답이 아니라 트레이드오프에 대한 이해입니다. "이 방법은 이런 장점이 있지만, 이런 단점이 있어서, 현재 상황에서는 이것이 더 적합합니다"라고 말할 수 있어야 합니다.</p><p>그리고 모르는 것은 솔직하게 모른다고 말하세요. 아는 척하는 것보다 "잘 모르지만 이렇게 접근해보겠습니다"라는 답변이 훨씬 좋은 인상을 줍니다.</p>',
    tags:['기술면접','CTO','개발자','취업']},
  103:{title:'프론트엔드 개발자가 꼭 알아야 할 2025 트렌드',date:'2025.10.15',cat:'AI·개발·데이터',views:389,cmts:73,likes:48,img:U+'frontend/800/420',
    body:'<p>프론트엔드 생태계는 매년 빠르게 변합니다. 2025년 프론트엔드 개발자가 반드시 알아야 할 기술 트렌드를 정리합니다.</p><h3>Server Components의 보편화</h3><p>React Server Components가 안정화되면서, 서버와 클라이언트의 경계가 점점 희미해지고 있습니다. Next.js, Remix 등의 프레임워크가 이를 본격적으로 지원하면서 프론트엔드 개발의 패러다임이 변하고 있습니다.</p><h3>AI 통합 개발</h3><p>GitHub Copilot을 넘어, AI가 코드 리뷰, 테스트 생성, 성능 최적화까지 지원하는 시대입니다. AI 도구를 효과적으로 활용하는 능력이 생산성의 핵심 차별점이 되고 있습니다.</p><h3>Web Performance</h3><p>Core Web Vitals가 SEO에 직접적 영향을 미치면서, 성능 최적화에 대한 수요가 계속 증가하고 있습니다. Lazy Loading, Code Splitting, Edge Computing 등의 기법을 실무에서 자유롭게 적용할 수 있어야 합니다.</p>',
    tags:['프론트엔드','트렌드','React','개발']},

  201:{title:'디자이너에서 PM으로, 직무 전환 성공기',date:'2025.10.17',cat:'디자인',views:312,cmts:58,likes:41,img:U+'designpm/800/420',
    body:'<p>5년차 UI 디자이너에서 프로덕트 매니저로 전환한 경험을 공유합니다. 디자이너 출신 PM의 강점과 준비 과정을 솔직하게 이야기합니다.</p><h3>왜 전환을 결심했나</h3><p>디자인을 하면서 항상 "왜 이 기능을 만드는가"에 대한 의문이 있었습니다. 사용자 리서치와 데이터 분석에 관심이 커지면서, 프로덕트 전체를 보는 역할을 원하게 되었습니다.</p><h3>디자이너의 강점</h3><p>사용자 중심 사고, 시각적 커뮤니케이션 능력, 프로토타이핑 역량은 PM으로서 큰 강점이 됩니다. 특히 개발팀과의 소통에서 와이어프레임으로 빠르게 아이디어를 전달할 수 있어 효율적입니다.</p><blockquote>디자이너가 PM이 되면, "어떻게 만들 것인가"에서 "무엇을 왜 만들 것인가"로 관점이 확장됩니다.</blockquote><p>준비 과정에서 가장 도움이 된 것은 SQL과 데이터 분석 기초 학습, PM 관련 서적 읽기, 사이드 프로젝트에서 PM 역할 경험이었습니다.</p>',
    tags:['디자인','PM','직무전환','커리어']},
  202:{title:'UX 디자이너의 포트폴리오 차별화 전략',date:'2025.10.14',cat:'디자인',views:278,cmts:44,likes:33,img:U+'uxport/800/420',
    body:'<p>수백 개의 UX 디자이너 포트폴리오를 리뷰한 경험을 바탕으로, 합격하는 포트폴리오의 공통점을 분석합니다.</p><h3>과정을 보여주라</h3><p>예쁜 결과물만 나열하는 포트폴리오는 감점입니다. 리서치 → 문제 정의 → 가설 수립 → 프로토타이핑 → 테스트 → 개선의 전체 과정을 보여주세요.</p><h3>임팩트를 수치화하라</h3><p>"사용성을 개선했습니다"가 아닌 "전환율 15% 개선, 이탈률 23% 감소"처럼 정량적 성과를 제시하세요. 측정이 불가능했다면, 정성적 피드백이라도 포함하세요.</p><h3>3~4개 프로젝트에 집중하라</h3><p>10개의 얕은 프로젝트보다 3~4개의 깊이 있는 프로젝트가 훨씬 효과적입니다. 하나의 프로젝트에서 얼마나 깊이 고민했는지가 디자이너의 역량을 보여줍니다.</p>',
    tags:['UX','포트폴리오','디자인','취업']},
  203:{title:'피그마 마스터: 디자인 시스템 구축법',date:'2025.10.11',cat:'디자인',views:445,cmts:91,likes:63,img:U+'figma/800/420',
    body:'<p>피그마에서 효율적인 디자인 시스템을 구축하는 방법을 단계별로 안내합니다. 소규모 팀부터 대규모 조직까지 적용 가능한 실전 가이드입니다.</p><h3>토큰부터 시작하라</h3><p>색상, 타이포그래피, 간격, 그림자 등 기본 토큰을 먼저 정의하세요. 피그마의 Variables 기능을 활용하면 다크모드, 테마 전환이 자동으로 관리됩니다.</p><h3>컴포넌트 설계 원칙</h3><p>하나의 컴포넌트로 최대한 많은 변형을 커버하세요. Properties와 Variants를 적절히 조합하면 컴포넌트 수를 줄이면서도 유연성을 확보할 수 있습니다.</p><blockquote>좋은 디자인 시스템은 디자이너의 창의성을 제한하는 것이 아니라, 반복 작업에서 해방시켜 더 중요한 문제에 집중하게 해줍니다.</blockquote><p>도입 초기에는 완벽을 추구하지 마세요. 가장 자주 사용하는 컴포넌트 10개부터 시작해서 점진적으로 확장하는 것이 성공의 열쇠입니다.</p>',
    tags:['피그마','디자인시스템','UI','도구']},

  301:{title:'잡코리아 커리어 컨퍼런스, 이직 치트키',date:'2025.10.19',cat:'기획·전략',views:267,cmts:48,likes:32,img:U+'conference/800/420',
    body:'<p>잡코리아 커리어 컨퍼런스에서 공개된 이직 성공의 핵심 전략을 정리합니다. 현직 인사담당자와 헤드헌터가 알려주는 실전 노하우입니다.</p><h3>시장 타이밍 읽기</h3><p>이직에도 시즌이 있습니다. 1~3월은 새해 예산 확정 후 채용이 활발한 시기, 9~10월은 하반기 채용 시즌입니다. 본인의 업종과 직무에 맞는 최적의 타이밍을 파악하세요.</p><h3>이력서 커스터마이징</h3><p>하나의 이력서로 모든 곳에 지원하는 것은 비효율적입니다. 각 회사의 JD(직무 기술서)를 분석하고, 해당 역량을 강조하는 맞춤형 이력서를 작성하세요.</p><h3>레퍼런스 체크 대비</h3><p>요즘 기업들은 레퍼런스 체크를 적극적으로 합니다. 평소 동료, 상사와 좋은 관계를 유지하고, 이직 시 레퍼런스를 제공해줄 수 있는 3~4명의 리스트를 미리 준비하세요.</p>',
    tags:['이직','컨퍼런스','커리어','전략']},
  302:{title:'LG전자 정성후 부장이 전하는 대기업 공략법',date:'2025.10.16',cat:'기획·전략',views:398,cmts:76,likes:51,img:U+'lgstrat/800/420',
    body:'<p>LG전자에서 15년간 근무하며 6개 대기업의 채용 프로세스를 경험한 정성후 부장의 입사 전략을 공개합니다.</p><h3>대기업 서류 통과의 비밀</h3><p>대기업 서류전형에서 가장 중요한 것은 직무 적합성입니다. 자기소개서의 모든 경험이 지원 직무와 연결되어야 합니다. 관련 없는 스펙 나열보다 하나의 깊은 경험이 훨씬 효과적입니다.</p><h3>면접에서의 차별화</h3><p>대기업 면접은 "인재상에 맞는 사람"을 뽑는 것입니다. 지원 기업의 인재상을 숙지하고, 본인의 경험에서 해당 가치를 체현한 사례를 구체적으로 준비하세요.</p><blockquote>대기업은 기본적으로 조직 문화에 잘 적응할 수 있는 사람을 원합니다. 튀는 것보다 함께할 수 있는 모습을 보여주세요.</blockquote><p>입사 후 1년이 가장 중요합니다. 시키는 일을 잘하는 것을 넘어, 조직 내 네트워크를 적극적으로 구축하세요.</p>',
    tags:['대기업','LG전자','취업','전략']},
  303:{title:'신입 기획자가 알아야 할 문서 작성법',date:'2025.10.13',cat:'기획·전략',views:223,cmts:39,likes:27,img:U+'plandoc/800/420',
    body:'<p>기획자의 무기는 문서입니다. 신입 기획자가 현업에서 바로 활용할 수 있는 기획서, PRD, 정책서 작성의 핵심을 정리합니다.</p><h3>기획서의 구조</h3><p>좋은 기획서는 5분 안에 핵심을 파악할 수 있어야 합니다. 배경/목적 → 현황 분석 → 솔루션 → 기대효과 → 일정의 구조를 기본으로 하되, 읽는 사람의 관심사에 따라 순서를 조정하세요.</p><h3>PRD 작성 팁</h3><p>PRD(Product Requirements Document)는 개발팀과의 소통 도구입니다. 모호한 표현은 금물입니다. "빠르게 로딩되어야 한다" 대신 "페이지 로딩 2초 이내"처럼 구체적으로 작성하세요.</p><h3>정책서의 중요성</h3><p>엣지 케이스를 미리 정의하는 정책서가 개발 단계의 혼란을 줄여줍니다. "만약 ~한 경우에는 이렇게 처리한다"를 최대한 많이 적어두세요.</p>',
    tags:['기획','문서작성','PRD','신입']},

  401:{title:'마케터의 성과 측정, 숫자 너머의 이야기',date:'2025.10.20',cat:'마케팅',views:198,cmts:33,likes:20,img:U+'mktmetric/800/420',

    html += '</div>';
  }
  html += '<div class="actions"><div class="act-left"><button class="act-btn" id="likeBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>좋아요 '+art.likes+'</button><button class="act-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>공유</button></div><button class="act-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>스크랩</button></div>';
  html += '<div class="divider"></div>';
  html += '<div class="cmt-section"><div class="cmt-hd"><div><span class="cmt-title">댓글</span><span class="cmt-count">'+selComments.length+'</span></div><button class="cmt-sort">최신순 ▾</button></div>';
  selComments.forEach(function(c){
    html += '<div class="cmt-item"><div class="cmt-avatar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><div class="cmt-body"><p class="cmt-author">'+c.author+'</p><p class="cmt-text">'+c.text+'</p><div class="cmt-meta"><span>'+c.time+'</span><button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>'+c.likes+'</button><button>답글</button></div></div></div>';
  });
  html += '</div>';

  document.getElementById('mainContent').innerHTML = html;

  /* Like toggle */
  var likeBtn = document.getElementById('likeBtn');
  if(likeBtn){
    likeBtn.addEventListener('click',function(){
      this.classList.toggle('liked');
    });
  }
}

/* Back button */
document.getElementById('backBtn').addEventListener('click',function(){
  if(document.referrer && document.referrer.indexOf('contents-home')>=0){
    history.back();
  } else {
    location.href = 'index.html';
  }
});

/* Send button activation */
var cmtInput = document.getElementById('cmtInput');
var sendBtn = document.getElementById('sendBtn');
cmtInput.addEventListener('input',function(){
  sendBtn.classList.toggle('active', this.value.trim().length > 0);
});

})();
</script>
</body>
</html>
