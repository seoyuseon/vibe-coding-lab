<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FFFFFF">
  <title>취업톡톡 - 잡코리아</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
  <style>
    :root{
      --g900:#222;--g800:#444;--g700:#666;--g600:#888;--g500:#999;
      --g400:#BBB;--g300:#D1D1D1;--g200:#E8E8E8;--g100:#F4F4F4;--g50:#F7F7F7;
      --white:#FFF;--blue:#1B55F6;--red:#E8553D;--orange:#FF6B35;
      --hdr:48px;--safe:env(safe-area-inset-bottom,0px);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{-webkit-text-size-adjust:100%}
    body{font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,Roboto,sans-serif;color:var(--g900);background:var(--white);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
    a{text-decoration:none;color:inherit}
    button{border:none;background:none;font:inherit;cursor:pointer;color:inherit}

    .app{max-width:480px;margin:0 auto;position:relative;min-height:100dvh;background:var(--white)}

    /* Header */
    .hdr{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:var(--hdr);background:var(--white);display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:100;border-bottom:1px solid var(--g200)}
    .hdr-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%}
    .hdr-btn:active{background:var(--g50)}
    .hdr-btn svg{width:24px;height:24px}
    .hdr-right{display:flex;gap:4px}
    .hdr-cat{font-size:15px;font-weight:600;color:var(--g800)}

    .main{padding-top:var(--hdr);padding-bottom:calc(60px + var(--safe))}

    /* Tags */
    .qtags{padding:20px 20px 0;display:flex;gap:6px;flex-wrap:wrap}
    .qtag{font-size:12px;font-weight:600;padding:4px 10px;border-radius:4px;background:#F6F7F8;color:#768091}
    .qtag.hot{background:#F0F2FA;color:var(--blue)}

    /* Question */
    .q-title{padding:14px 20px 12px;font-size:20px;font-weight:700;line-height:1.45;word-break:keep-all}

    /* Meta */
    .q-meta{padding:0 20px 20px;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--g500)}
    .q-meta-dot{width:2px;height:2px;border-radius:50%;background:var(--g400)}
    .q-avatar{width:24px;height:24px;border-radius:50%;background:var(--g100);display:flex;align-items:center;justify-content:center;color:var(--g500);margin-right:4px}
    .q-avatar svg{width:14px;height:14px}
    .q-author{color:var(--g700);font-weight:500;display:flex;align-items:center}

    /* Body */
    .q-body{padding:0 20px 28px;font-size:16px;line-height:1.75;color:var(--g800);word-break:keep-all;border-bottom:1px solid var(--g100)}
    .q-body p{margin-bottom:16px}
    .q-body p:last-child{margin-bottom:0}

    /* Action bar */
    .q-actions{display:flex;align-items:center;padding:14px 20px;border-bottom:8px solid var(--g50);gap:12px}
    .act-btn{display:flex;align-items:center;gap:4px;font-size:13px;color:var(--g600);padding:6px 10px;border-radius:20px;transition:background .15s}
    .act-btn:active{background:var(--g100)}
    .act-btn svg{width:18px;height:18px}
    .act-btn.liked{color:var(--red)}
    .act-btn.liked svg{fill:var(--red);stroke:var(--red)}

    /* Answer Section */
    .ans-sec{padding:20px}
    .ans-hd{font-size:16px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px}
    .ans-count{color:var(--blue);font-weight:700}
    .ans-sub{font-size:13px;color:var(--g500);margin-bottom:20px}

    .ans-item{display:flex;gap:10px;padding:16px 0;border-bottom:1px solid var(--g100)}
    .ans-item:last-child{border-bottom:none}
    .ans-avatar{flex-shrink:0;width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#E8E9FD,#D0D3F0);display:flex;align-items:center;justify-content:center;color:var(--g500);font-size:14px;font-weight:700}
    .ans-body{flex:1;min-width:0}
    .ans-author{display:flex;align-items:center;gap:6px;margin-bottom:4px}
    .ans-author-name{font-size:14px;font-weight:600}
    .ans-author-badge{font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px;background:#F0F2FA;color:var(--blue)}
    .ans-text{font-size:14px;line-height:1.6;color:var(--g800);word-break:keep-all}
    .ans-meta{display:flex;gap:12px;margin-top:8px;font-size:12px;color:var(--g500)}
    .ans-meta button{font-size:12px;color:var(--g500);display:flex;align-items:center;gap:3px}
    .ans-meta button svg{width:13px;height:13px}

    /* Bottom Bar */
    .bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--white);border-top:1px solid var(--g200);display:flex;align-items:center;gap:10px;padding:10px 16px;padding-bottom:calc(10px + var(--safe));z-index:100}
    .ans-input{flex:1;height:40px;border:1px solid var(--g200);border-radius:20px;padding:0 16px;font-size:14px;outline:none;background:var(--g50);transition:all .2s}
    .ans-input:focus{border-color:var(--blue);background:var(--white)}
    .ans-input::placeholder{color:var(--g400)}
    .send-btn{width:36px;height:36px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.4;transition:opacity .2s}
    .send-btn.active{opacity:1}
    .send-btn svg{width:18px;height:18px;color:var(--white)}
  </style>
</head>
